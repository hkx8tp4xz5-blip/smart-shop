<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>登录 - 智慧商品信息管理系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body style="background: linear-gradient(135deg, #C6A4F9 0%, #8EC5FC 40%, #FDB99B 100%);">
<div class="login-container" style="background:transparent;">
    <div class="login-card">
        <div class="login-logo"><i class="fa-solid fa-boxes"></i></div>
        <h2>智慧商品信息管理系统</h2>
        <p class="login-subtitle">请输入账号密码登录系统</p>
        <div th:if="${param.error}" class="login-error"><i class="fa-solid fa-circle-exclamation"></i> 用户名或密码错误</div>
        <div th:if="${param.logout}" class="alert alert-info"><i class="fa-solid fa-circle-check"></i> 您已安全退出</div>
        <form th:action="@{/doLogin}" method="post">
            <div class="form-group">
                <label><i class="fa-solid fa-user" style="margin-right:4px"></i>用户名</label>
                <input type="text" name="username" placeholder="请输入用户名" required>
            </div>
            <div class="form-group">
                <label><i class="fa-solid fa-lock" style="margin-right:4px"></i>密码</label>
                <input type="password" name="password" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;height:42px;font-size:15px;margin-top:6px;"><i class="fa-solid fa-right-to-bracket"></i> 登 录</button>
        </form>
    </div>
</div>
</body>
</html>
