<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>编辑供应商</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="page-header">
    <h2><i class="fa-solid fa-pen-to-square" style="color:#3B82F6;margin-right:6px"></i>编辑供应商</h2>
</div>
<div class="card">
    <div class="card-header"><i class="fa-solid fa-rectangle-list" style="color:#3B82F6;margin-right:6px"></i>供应商信息</div>
    <div class="card-body">
        <form th:action="@{/supplier/edit}" method="post">
            <input type="hidden" name="id" th:value="${supplier.id}">
            <div class="form-group" style="margin-bottom:18px">
                <label><i class="fa-solid fa-tag" style="margin-right:4px"></i>供应商名称</label>
                <input type="text" name="name" th:value="${supplier.name}" required style="width:360px">
            </div>
            <div class="form-group" style="margin-bottom:18px">
                <label><i class="fa-solid fa-user" style="margin-right:4px"></i>联系人</label>
                <input type="text" name="contact" th:value="${supplier.contact}" style="width:280px">
            </div>
            <div class="form-group" style="margin-bottom:18px">
                <label><i class="fa-solid fa-phone" style="margin-right:4px"></i>联系电话</label>
                <input type="text" name="phone" th:value="${supplier.phone}" style="width:200px">
            </div>
            <div class="form-group" style="margin-bottom:24px">
                <label><i class="fa-solid fa-location-dot" style="margin-right:4px"></i>地址</label>
                <input type="text" name="address" th:value="${supplier.address}" style="width:400px">
            </div>
            <div style="display:flex;gap:8px;">
                <button type="submit" class="btn btn-primary"><i class="fa-solid fa-floppy-disk"></i> 保存</button>
                <a th:href="@{/supplier/list}" class="btn btn-outline"><i class="fa-solid fa-xmark"></i> 取消</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
