<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>智慧商品信息管理系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="landing-body">

<div class="landing">
    <div class="landing-nav glass">
        <div class="landing-brand"><i class="fa-solid fa-boxes" style="color:#3B82F6"></i> 智慧商品信息管理系统</div>
        <div class="landing-nav-links">
            <a th:href="@{/login}" class="btn btn-outline btn-sm"><i class="fa-solid fa-right-to-bracket"></i> 登录</a>
        </div>
    </div>

    <div class="landing-hero">
        <div class="glass landing-hero-card">
            <div class="landing-hero-badge">🎯 企业级管理系统</div>
            <h1>智慧商品信息管理系统</h1>
            <p>基于 SpringBoot + MyBatis + Thymeleaf + Security + Redis 构建的综合信息化平台，<br>
            实现商品数据的智能化管理、安全访问控制与高性能缓存优化。</p>
            <div class="landing-features">
                <div class="landing-feature">
                    <i class="fa-solid fa-cube"></i>
                    <span>商品管理</span>
                </div>
                <div class="landing-feature">
                    <i class="fa-solid fa-folder"></i>
                    <span>分类管理</span>
                </div>
                <div class="landing-feature">
                    <i class="fa-solid fa-truck"></i>
                    <span>供应商管理</span>
                </div>
                <div class="landing-feature">
                    <i class="fa-solid fa-chart-line"></i>
                    <span>数据看板</span>
                </div>
            </div>
            <a th:href="@{/login}" class="btn btn-primary landing-cta"><i class="fa-solid fa-right-to-bracket"></i> 进入管理系统</a>
        </div>
    </div>

    <div class="landing-footer">
        <div class="glass" style="padding: 16px 24px; display: flex; align-items: center; justify-content: center; gap: 24px; font-size: 13px; color: var(--text-muted);">
            <span><i class="fa-solid fa-cube"></i> 智慧商品信息管理系统</span>
            <span>|</span>
            <span>基于 SpringBoot 3.2 + JDK 21 构建</span>
            <span>|</span>
            <span><i class="fa-regular fa-copyright"></i> 2026 课程设计</span>
        </div>
    </div>
</div>

</body>
</html>
